name: Runbook Build & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Determine Version
        run: |
          echo "SEMVER=$(grep ^SEMVER Makefile | awk '{print $3}')" >> $GITHUB_ENV
          echo "VERSION=$(grep ^SEMVER Makefile | awk '{print $3}')-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Run Tests
        run: make test

      - name: Build Binary
        run: make build CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} VERSION=${{ env.VERSION }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runbook-${{ matrix.goos }}-${{ matrix.goarch }}
          path: runbook

      - name: Create or Update Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          
          git tag -f latest
          git push origin latest -f

          git tag -f ${{ env.VERSION }}
          git push origin ${{ env.VERSION }}
          
          gh release create ${{ env.SEMVER }} ./runbook-${{ matrix.goos }}-${{ matrix.goarch }} \
            --title "runbook ${{ env.SEMVER }}" \
            --notes "Automated build of version ${{ env.SEMVER }}"

          gh release create latest ./runbook-${{ matrix.goos }}-${{ matrix.goarch }} \
            --title "runbook ${{ env.SEMVER }}" \
            --notes "Automated build of version ${{ env.VERSION }}"
